<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Card</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(50% 85.74% at 50% 50%, #777777 0%, #444444 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }
        .card {
            background-color: #000000;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            padding: 24px;
            color: white;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>This is a test card</h2>
        <p>If you can see this, the card is displaying correctly.</p>
    </div>
</body>
</html>
